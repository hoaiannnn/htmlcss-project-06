    <body style="height: 5000px">
        <!-- Header PC -->
        <header class="header fixed">
            <div class="container">
                <div class="header__inner">
                    <!-- Mobile logo -->
                    <a href="#" class="mobile-logo show-on-mobile">
                        <img
                            class="mobile-logo__img"
                            src="./assets/img/mobile-logo.png"
                            alt="logo"
                        />
                    </a>

                    <!-- Mobile info -->
                    <div class="info show-on-mobile">
                        <a
                            href="mailto:hi@arif.interactive"
                            class="info__icon-wrap"
                        >
                            <img
                                src="./assets/icons/header-mobile-info-icon.svg"
                                alt="mail"
                            />
                        </a>

                        <a href="mailto:hi@arif.interactive" class="info__link">
                            hi@arif.interactive
                        </a>

                        <!-- Tablet/mobile menu -->
                        <label
                            for="mobile-header__checkbox"
                            class="toggle-menu show-on-mobile"
                        >
                            <img
                                src="./assets/icons/toggle-menu-icon.svg"
                                alt=""
                            />
                        </label>
                    </div>

                    <!-- Header info -->
                    <div class="info show-on-pc">
                        <a
                            href="mailto:hi@arif.interactive"
                            class="info__icon-wrap"
                        >
                            <img
                                src="./assets/icons/header-info-icon.svg"
                                alt="mail"
                            />
                        </a>

                        <a href="mailto:hi@arif.interactive" class="info__link">
                            hi@arif.interactive
                        </a>
                    </div>

                    <!-- Logo -->
                    <a href="#" class="header__logo logo">
                        <img
                            class="logo__img"
                            src="./assets/img/Logo.png"
                            alt="logo"
                        />
                    </a>

                    <!-- Navbar -->
                    <nav class="navbar">
                        <ul class="navbar__list">
                            <li class="navbar__item">
                                <a href="#!" class="navbar__link">Projects</a>
                            </li>
                            <li class="navbar__item">
                                <a href="#!" class="navbar__link">Journey</a>
                            </li>
                            <li class="navbar__item">
                                <a href="#!" class="navbar__link">Service</a>
                            </li>
                            <li class="navbar__item">
                                <a href="#!" class="navbar__link">Contact</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </header>

        <!-- Tablet/mobile header -->
        <header class="mobile-header">
            <input
                type="checkbox"
                name=""
                id="mobile-header__checkbox"
                class="mobile-header__checkbox"
                hidden
            />

            <!-- Overlay -->
            <label for="mobile-header__checkbox" class="mobile-header__overlay">
            </label>

            <!-- Menu content -->
            <label for="mobile-header__checkbox" class="menu-header__drawer">
                <div class="x-button">
                    <svg
                        class="x-button__icon"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 640 640"
                        fill="currentColor"
                    >
                        <path

                    </li>
                    <li class="mobile-navbar__item">

                    </li>
                </ul>
            </label>
